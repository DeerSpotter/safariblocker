name: Build SafariBlocker deb

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          brew update
          brew install make ldid dpkg xz
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> "$GITHUB_PATH"
          echo "/usr/local/opt/make/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Install Theos and iOS SDKs
        run: |
          set -euo pipefail
          rm -rf "$HOME/theos"
          git clone --recursive --depth 1 --shallow-submodules https://github.com/theos/theos.git "$HOME/theos"
          rm -rf "$HOME/theos/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git "$HOME/theos/sdks"
          find "$HOME/theos/sdks" -maxdepth 1 -type d -name '*.sdk' -print

      - name: Add Preferences private framework linker stub
        run: |
          set -euo pipefail
          for sdk in "$HOME"/theos/sdks/iPhoneOS*.sdk; do
            framework_dir="$sdk/System/Library/PrivateFrameworks/Preferences.framework"
            mkdir -p "$framework_dir"
            {
              printf '%s\n' '--- !tapi-tbd'
              printf '%s\n' 'tbd-version: 4'
              printf '%s\n' 'targets: [ arm64-ios, arm64e-ios ]'
              printf '%s\n' 'install-name: /System/Library/PrivateFrameworks/Preferences.framework/Preferences'
              printf '%s\n' 'exports:'
              printf '%s\n' '  - targets: [ arm64-ios, arm64e-ios ]'
              printf '%s\n' '    symbols:'
              printf '%s\n' '      - _OBJC_CLASS_$_PSListController'
              printf '%s\n' '      - _OBJC_METACLASS_$_PSListController'
              printf '%s\n' '      - _OBJC_IVAR_$_PSListController._specifiers'
              printf '%s\n' '      - _OBJC_CLASS_$_PSSpecifier'
              printf '%s\n' '      - _OBJC_METACLASS_$_PSSpecifier'
              printf '%s\n' '...'
            } > "$framework_dir/Preferences.tbd"
          done
          find "$HOME/theos/sdks" -path '*/Preferences.framework/Preferences.tbd' -print

      - name: Validate package layout
        run: |
          test -f package/DEBIAN/control
          test -d package/var/jb
          test -d assets/hex
          test -f prefs/Makefile
          test -f prefs/TBRootListController.m
          find package -type f | sort

      - name: Restore binary payload files
        run: scripts/rebuild-binaries.sh package

      - name: Build preference bundle with plus popup UI
        run: |
          set -euo pipefail
          export THEOS="$HOME/theos"
          make -C prefs clean stage
          echo "Staged SafariBlocker bundle binaries:"
          find prefs/.theos -path '*/SafariBlocker.bundle/SafariBlocker' -type f -print -exec file {} \;
          PREF_BINARY="$(find prefs/.theos -path '*/SafariBlocker.bundle/SafariBlocker' -type f | head -n 1)"
          test -n "$PREF_BINARY"
          cp "$PREF_BINARY" package/var/jb/Library/PreferenceBundles/SafariBlocker.bundle/SafariBlocker
          file package/var/jb/Library/PreferenceBundles/SafariBlocker.bundle/SafariBlocker

      - name: Build deb package
        run: |
          set -euo pipefail
          mkdir -p dist
          chmod 0755 package/DEBIAN
          chmod 0644 package/DEBIAN/control
          VERSION=$(awk -F': ' '/^Version:/{print $2}' package/DEBIAN/control)
          ARCH=$(awk -F': ' '/^Architecture:/{print $2}' package/DEBIAN/control)
          OUT="dist/com.deerspotter.safariblocker_v${VERSION}_${ARCH}.deb"
          dpkg-deb --root-owner-group --build package "$OUT"
          shasum -a 256 "$OUT" | tee dist/SHA256SUMS

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: safariblocker-deb
          path: |
            dist/*.deb
            dist/SHA256SUMS

      - name: Attach deb to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/SHA256SUMS
